# ═══════════════════════════════════════════════════════════════════════════
#  Orange Lab — Microbiology CDSS  ·  "Cyber-Bio" base theme (DARK)
#
#  Colours mirror the design tokens at the top of orange_theme.py. This file
#  gives Streamlit its dark base palette + font so native widgets (dataframe,
#  dropdown menus) render dark too; the full skin is applied by
#  orange_theme.inject_theme().
#
#  If you change CYAN/BG in orange_theme.py, update the values below to match.
#  Place this file at:  <repo-root>/.streamlit/config.toml
# ═══════════════════════════════════════════════════════════════════════════

[theme]
base                     = "dark"
primaryColor             = "#00E5A0"
backgroundColor          = "#0A1424"
secondaryBackgroundColor = "#0F2138"
textColor                = "#E7EEF8"
font                     = "sans serif"

[browser]
gatherUsageStats = false
